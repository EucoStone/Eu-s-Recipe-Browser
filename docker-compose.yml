services:
  mongodb:
    image: mongo:7
    container_name: recipebrowser-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    image: python:3.12-slim
    container_name: recipebrowser-backend
    working_dir: /app/backend
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: recipe_browser
      UPLOAD_DIR: uploads
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      - mongodb

  frontend:
    image: node:22-alpine
    container_name: recipebrowser-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
    ports:
      - "3000:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  mongodb_data:
